# Witness ensemble configuration. See WitnessSet.generate() in
# conference_baseline_snapshot/src/qem/witness.py for the construction
# algorithm.

n_witnesses: 50
depth: 5
n_qubits: 4
seed: 42
description: |
  50 random Clifford circuits at depth 5 on 4 qubits, each paired
  with a random non-identity 4-qubit Pauli observable. Generated via
  numpy default_rng(42) for reproducibility. The same witness set is
  used across all journal-extension experiments.
